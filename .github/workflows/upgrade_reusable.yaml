name: Node upgrade tests reusable

on:
  workflow_call:
    inputs:
      env-path:
        required: true
        type: string
      base_rev:
        required: false
        type: string
        default: ""
      base_tar_url:
        required: false
        type: string
        default: ""
      upgrade_rev:
        required: false
        type: string
        default: ""
      upgrade_cli_rev:
        required: false
        type: string
        default: ""
      byron_cluster:
        required: false
        type: boolean
        default: false
    secrets:
      GH_TOKEN:
        required: true
      CI_FAIL_MAILS:
        required: false
      GMAIL_USERNAME:
        required: false
      GMAIL_PASSWORD:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

env:
  PY_COLORS: "1"
  BASE_REVISION: ${{ inputs.base_rev }}
  BASE_TAR_URL: ${{ inputs.base_tar_url }}
  UPGRADE_REVISION: ${{ inputs.upgrade_rev }}
  UPGRADE_CLI_REVISION: ${{ inputs.upgrade_cli_rev }}
  CI_BYRON_CLUSTER: ${{ inputs.byron_cluster }}

jobs:
  reusable_run:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GH_TOKEN }}
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= iohk.cachix.org-1:DpRUyj7h7V830dp/i6Nti+NEO2/nhblbov/8MW7Rqoo=
            substituters = https://cache.nixos.org https://cache.iog.io https://iohk.cachix.org
            allow-import-from-derivation = true
      - name: Load extra env from file
        if: inputs.env-path
        env:
          ENV_PATH: ${{ inputs.env-path }}
        run: |
          [ -e "$ENV_PATH" ] && cat "$ENV_PATH" >> "$GITHUB_ENV"
      - name: ▶️ Run Upgrade Tests
        id: testing-step
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # env
          echo "::group::Script setup"
          ./runner/node_upgrade.sh
          echo "::endgroup::"
      - name: Load failure-analysis prompt
        id: load-analysis-prompt
        if: (success() || failure()) && steps.testing-step.outcome != 'success' && secrets.CLAUDE_CODE_OAUTH_TOKEN
        run: |
          {
            echo 'ANALYSIS_PROMPT<<__EOF_PROMPT42__'
            sed 's|{RUN_DIR}|run_workdir|g' agent_docs/upgrade_failure_analysis_prompt.md
            printf '\n__EOF_PROMPT42__\n'
          } >> "$GITHUB_ENV"
      - name: 🤖 Analyze test failures with Claude
        id: analyze-failures
        if: (success() || failure()) && steps.testing-step.outcome != 'success' && secrets.CLAUDE_CODE_OAUTH_TOKEN
        continue-on-error: true
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: sonnet
          max_turns: "40"
          allowed_tools: "Read,Write,Glob,Grep,Bash(ls:*),Bash(wc:*),Bash(head:*),Bash(tail:*),Bash(grep:*),Bash(find:*),Bash(cut:*),Bash(sort:*),Bash(uniq:*),Bash(awk:*),Bash(jq:*)"
          prompt: ${{ env.ANALYSIS_PROMPT }}
      - name: Read failure analysis into env
        id: read-analysis
        if: (success() || failure()) && steps.testing-step.outcome != 'success' && secrets.CLAUDE_CODE_OAUTH_TOKEN
        run: |
          if [ -s run_workdir/failure_analysis.md ]; then
            {
              echo 'FAILURE_ANALYSIS<<__EOF_ANALYSIS42__'
              cat run_workdir/failure_analysis.md
              # ensure delimiter is on its own line even if the file lacks a trailing newline
              printf '\n__EOF_ANALYSIS42__\n'
            } >> "$GITHUB_ENV"

            # Surface the analysis in the workflow run UI itself: full content
            # in a foldable log group, and a copy in the run summary so it's
            # reachable without downloading the testrun-files artifact.
            echo "::group::Preliminary failure analysis"
            cat run_workdir/failure_analysis.md
            echo
            echo "::endgroup::"
            cat run_workdir/failure_analysis.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "FAILURE_ANALYSIS=(no analysis produced)" >> "$GITHUB_ENV"
            echo "::warning::No run_workdir/failure_analysis.md produced by the analyze step."
          fi
      - name: ↟ Upload testing artifacts on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: testing-artifacts
          path: run_workdir/testing_artifacts.tar.xz
      - name: ↟ Upload Allure results for step1
        uses: actions/upload-artifact@v7
        # When using `always()`, you lose ability to manually cancel the workflow.
        # Use `success() || failure()` instead.
        if: success() || failure()
        with:
          name: allure-results-step1
          path: run_workdir/allure-results-step1.tar.xz
      - name: ↟ Upload Allure results for step2
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: allure-results-step2
          path: run_workdir/allure-results-step2.tar.xz
      - name: ↟ Upload Allure results for step3
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: allure-results-step3
          path: run_workdir/allure-results-step3.tar.xz
      - name: ↟ Upload HTML reports
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: testrun-reports
          path: |
            run_workdir/testrun-report-step1.html
            run_workdir/testrun-report-step2.html
            run_workdir/testrun-report-step3.html
      - name: ↟ Upload testrun files
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: testrun-files
          path: |
            run_workdir/scheduling.log
            run_workdir/errors_all.log
            run_workdir/failure_analysis.md
      - name: ↟ Upload CLI coverage
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: cli-coverage
          path: run_workdir/cli_coverage.json
      - name: ✉ Mail failure report
        uses: dawidd6/action-send-mail@v17
        if: (success() || failure()) && steps.testing-step.outcome != 'success' && secrets.CI_FAIL_MAILS && github.event_name == 'schedule'
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{secrets.GMAIL_USERNAME}}
          password: ${{secrets.GMAIL_PASSWORD}}
          subject: "Status: ${{ steps.testing-step.outcome }}; workflow: ${{ github.workflow }}"
          to: ${{secrets.CI_FAIL_MAILS}}
          from: 'Cardano GitHub Actions <${{secrets.GMAIL_USERNAME}}>'
          convert_markdown: true
          body: &mail_body |
            Run URL: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>

            ── Preliminary failure analysis ──

            ${{ env.FAILURE_ANALYSIS }}
          html_body: *mail_body
          reply_to: noreply@github.com
          attachments: run_workdir/testrun-report-step1.html,run_workdir/testrun-report-step2.html,run_workdir/testrun-report-step3.html
